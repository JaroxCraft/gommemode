name: Run Client

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  run-client:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - name: Install xvfb and mesa libraries
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri

      - name: Launch client and verify it starts
        run: |
          rm -f run/logs/latest.log
          xvfb-run -a ./gradlew runClient &
          PID=$!

          LOGFILE="run/logs/latest.log"
          TIMEOUT=120
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            if [ -f "$LOGFILE" ] && grep -q "Gommemode initialized!" "$LOGFILE" 2>/dev/null; then
              echo "Client started successfully after ${ELAPSED}s"
              kill $PID 2>/dev/null
              wait $PID 2>/dev/null
              exit 0
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          echo "Timed out after ${TIMEOUT}s waiting for client to start"
          kill $PID 2>/dev/null
          wait $PID 2>/dev/null
          exit 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: client-logs
          path: run/logs/
