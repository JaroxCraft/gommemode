name: Renovate Config Validator

on:
  pull_request:
    paths:
      - 'renovate.json'
  push:
    paths:
      - 'renovate.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Validate Renovate config
        uses: rinchsan/renovate-config-validator@v0.2.1
        with:
          pattern: 'renovate.json'
