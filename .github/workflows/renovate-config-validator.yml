name: Renovate Config Validator

on:
  pull_request:
    paths:
      - 'renovate.json'
  push:
    paths:
      - 'renovate.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate Renovate config
        uses: rinchsan/renovate-config-validator@8cf44ae5646f111f838a03ac7ebd4e1c1f9be983
        with:
          pattern: 'renovate.json'
