name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - name: Validate tag matches gradle.properties
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MOD_VER="${VERSION%%+*}"
          MC_VER="${VERSION##*+}"

          if ! echo "$MOD_VER" | grep -qP '^\d+\.\d+\.\d+(-[\w.]+)?$'; then
            echo "::error::Invalid mod version format: $MOD_VER. Expected semver (e.g. 1.0.0 or 1.0.0-beta.1)"
            exit 1
          fi
          if ! echo "$MC_VER" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "::error::Invalid minecraft version format: $MC_VER. Expected semver (e.g. 26.1.2)"
            exit 1
          fi

          PROPS_MOD=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          PROPS_MC=$(grep -oP '^minecraft\s*=\s*"\K[^"]+' gradle/libs.versions.toml)

          echo "Tag:        v${MOD_VER}+${MC_VER}"
          echo "Properties: ${PROPS_MOD}+${PROPS_MC}"

          if [ "$MOD_VER" != "$PROPS_MOD" ] || [ "$MC_VER" != "$PROPS_MC" ]; then
            echo "::error::Tag version does not match project versions."
            echo "  Tag says:      ${MOD_VER}+${MC_VER}"
            echo "  gradle.properties: mod_version=${PROPS_MOD}"
            echo "  libs.versions.toml: minecraft=${PROPS_MC}"
            echo "Bump versions first, then re-tag."
            exit 1
          fi

          echo "full=${VERSION}"         >> $GITHUB_OUTPUT
          echo "mod=${MOD_VER}"          >> $GITHUB_OUTPUT
          echo "minecraft=${MC_VER}"     >> $GITHUB_OUTPUT
          if echo "$MOD_VER" | grep -q -- '-'; then
            echo "prerelease=true"       >> $GITHUB_OUTPUT
          else
            echo "prerelease=false"      >> $GITHUB_OUTPUT
          fi

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to Modrinth
        run: ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Gommemode ${{ steps.version.outputs.mod }} for Minecraft ${{ steps.version.outputs.minecraft }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
