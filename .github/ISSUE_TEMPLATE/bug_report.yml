name: Bug Report
description: Report a bug or crash in the mod
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us diagnose the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I press the G key, the game crashes..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps needed to reproduce the bug.
      placeholder: |
        1. Launch the game
        2. Enter a world
        3. Press the G key
        4. Observe the crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The GommeHD entity should spawn and play the hymn."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: "The game crashed to desktop."
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      description: Which Minecraft version are you running?
      placeholder: "e.g. 1.21.4"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      description: Which version of Gommemode are you using?
      placeholder: "e.g. 0.1.0+1.21.4"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Reports
      description: |
        Please paste any relevant log output or crash reports.
        Upload full files to [GitHub Gist](https://gist.github.com/) or [mclo.gs](https://mclo.gs/) and link them here if they are too long.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., other mods installed, singleplayer vs. multiplayer).

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this bug has not been reported yet.
          required: true
        - label: I am using the latest version of the mod for my Minecraft version.
          required: true
